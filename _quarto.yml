project:
  type: website
  output-dir: _site

website:
  title: "Your Name — Data Science Notebooks"
  description: "A collection of data analysis and data science projects"
  site-url: "https://notebooks.yourdomain.com"
  navbar:
    left:
      - href: index.qmd
        text: "Portfolio"
      - href: about.qmd
        text: "About"
    right:
      - icon: github
        href: https://github.com/teddy-mcdermott
      - icon: linkedin
        href: https://www.linkedin.com/in/teddy-mcdermott-5756bb257/

format:
  html:
    theme:
      light: cosmo        # try flatly, litera, or minty for other light looks
      dark: darkly        # try cyborg, slate, or solar for other dark looks
    css: styles.css
    toc: true
    code-fold: true       # code hidden by default per notebook
    code-tools: true      # adds "show all code" toggle at top of page
    code-summary: "Show code"
    fig-cap-location: bottom
    grid:
      body-width: 900px

execute:
  freeze: auto            # cache execution; re-render only if notebook changes